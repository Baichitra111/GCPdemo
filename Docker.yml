name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Display Current Directory
      run: pwd

    - name: List Repository Files
      run: ls -la

    - name: Build Docker Image
      run: docker build -t gcpdemo:latest .

    - name: Display Docker Images
      run: docker images